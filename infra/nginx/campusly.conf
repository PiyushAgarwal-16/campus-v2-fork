# Campusly V2 — Nginx reverse proxy skeleton (ARCHITECTURE.md §14.3, SECURITY.md §16).
#
# Single public entry point. Terminates TLS, routes HTTPS REST + WSS upgrades to
# the Node process (Express + Socket.IO share one port via PM2), applies edge
# security headers, gzip, and basic rate limiting. NO secrets live here.
#
# This is a deployment template for the Oracle ARM VM. Fill in the real domain
# and certificate paths (Let's Encrypt) during Phase 15 provisioning.

# Basic edge rate limiting (defense-in-depth; app-layer limits also apply).
limit_req_zone $binary_remote_addr zone=campusly_api:10m rate=20r/s;

upstream campusly_backend {
    server 127.0.0.1:4000;
    keepalive 32;
}

# Redirect all HTTP to HTTPS — no plaintext path (SECURITY.md §16).
server {
    listen 80;
    server_name api.campusly.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.campusly.in;

    # TLS — Let's Encrypt with auto-renewal (paths filled at provisioning).
    ssl_certificate     /etc/letsencrypt/live/api.campusly.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.campusly.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Edge security headers (SECURITY.md §16).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_types application/json text/plain application/javascript text/css;
    client_max_body_size 2m;

    # REST API.
    location /api/ {
        limit_req zone=campusly_api burst=40 nodelay;
        proxy_pass http://campusly_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO — WSS upgrade (ARCHITECTURE.md §14.3).
    location /socket.io/ {
        proxy_pass http://campusly_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }
}
